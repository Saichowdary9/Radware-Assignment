apiVersion: v1
kind: Pod
metadata:
  name: affinity-pod
  namespace: intern-test
spec:
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: workload
            operator: In
            values:
            - batch

  containers:
  - name: nginx
    image: nginx
